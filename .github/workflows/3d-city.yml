name: Generate 3D Isometric Contribution City

on:
  schedule:
    # Run automatically every 24 hours
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib
    steps:
      - uses: actions/checkout@v3
      - uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
      - name: Commit & Push 3D City
        run: |
          git config user.name "Abdul Nazeer M"
          git config user.email "roxnazeer@gmail.com"
          git add -A .
          git commit -m "style: generate 3D isometric contribution city" || echo "No changes to commit"
          git push
